---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-system
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: examples
spec:
  owner: guests
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-component
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-website
spec:
  type: website
  lifecycle: experimental
  owner: guests
  system: examples
  providesApis: [example-grpc-api]
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-api
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: example-grpc-api
spec:
  type: grpc
  lifecycle: experimental
  owner: guests
  system: examples
  definition: |
    syntax = "proto3";

    service Exampler {
      rpc Example (ExampleMessage) returns (ExampleMessage) {};
    }

    message ExampleMessage {
      string example = 1;
    };
---
# Test entity for local development: shows the OpenShift "Deployments" tab for the plugin.
# The plugin uses labels platform + service to build the Qontract path (/services/<platform>/<service>/app.yml).
# Without a real Qontract/App Interface proxy you will see "Error retrieving data from qontract" — that is expected.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-service
  labels:
    platform: local
    service: example-service
spec:
  type: service
  lifecycle: experimental
  owner: guests
  system: examples
