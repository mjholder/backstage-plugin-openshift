name: Test OpenShift Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'plugins/openshift/**'
      - '.github/workflows/test.yml'
      - 'package.json'
      - 'yarn.lock'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run OpenShift plugin tests
      run: |
        cd plugins/openshift
        yarn test --watchAll=false --passWithNoTests --coverage
      env:
        CI: true

    - name: Upload coverage reports to Codecov
      if: matrix.node-version == '22.x'
      uses: codecov/codecov-action@v4
      with:
        file: ./plugins/openshift/coverage/lcov.info
        flags: openshift-plugin
        name: openshift-plugin-coverage
        fail_ci_if_error: false

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-node-${{ matrix.node-version }}
        path: |
          plugins/openshift/coverage/
          plugins/openshift/junit.xml
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run lint checks for OpenShift plugin
      run: |
        cd plugins/openshift
        yarn lint

    - name: Run TypeScript type checks
      run: |
        cd plugins/openshift
        yarn tsc --noEmit

